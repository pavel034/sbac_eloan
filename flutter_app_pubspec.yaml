name: sbac_eloan
description: AI-powered digital micro-lending mobile application for SBAC Bank PLC

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.1.0

  # Authentication & Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.6.0
  firebase_storage: ^11.5.0
  firebase_app_check: ^0.2.1

  # Navigation
  go_router: ^11.1.0

  # HTTP & Networking
  dio: ^5.3.0
  http: ^1.1.0
  connectivity_plus: ^5.0.0

  # Storage & Security
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.0
  shared_preferences: ^2.2.0

  # UI & Design
  flutter_animate: ^4.2.0
  lottie: ^2.6.0
  cached_network_image: ^3.3.0
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.0

  # Charts & Analytics
  syncfusion_flutter_charts: ^23.1.36

  # Image & Camera
  image_picker: ^1.0.0
  camera: ^0.10.5
  image: ^4.1.0

  # Analytics
  firebase_analytics: ^10.6.0
  google_analytics_flutter: ^2.0.0

  # Notifications
  flutter_local_notifications: ^15.1.0

  # Device Info
  device_info_plus: ^10.0.0
  package_info_plus: ^5.0.0

  # JSON & Serialization
  json_annotation: ^4.8.0
  freezed_annotation: ^2.4.0

  # Utilities
  uuid: ^4.0.0
  intl: ^0.19.0
  logger: ^2.0.0
  dio_logging: ^0.3.0

  # Localization
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting & Code Quality
  flutter_lints: ^3.0.0

  # Code Generation
  build_runner: ^2.4.0
  json_serializable: ^6.7.0
  freezed: ^2.4.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/strings/

  # Fonts
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700

    - family: Sohne
      fonts:
        - asset: assets/fonts/Sohne-Regular.ttf
          weight: 400
        - asset: assets/fonts/Sohne-Bold.ttf
          weight: 700
